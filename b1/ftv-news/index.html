<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiwan News - B1 English</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 10px; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .subtitle { color: rgba(255,255,255,0.9); text-align: center; margin-bottom: 20px; }
        .back-link { display: inline-block; color: white; text-decoration: none; margin-bottom: 20px; padding: 10px 20px; background: rgba(255,255,255,0.2); border-radius: 20px; transition: all 0.3s ease; }
        .back-link:hover { background: rgba(255,255,255,0.3); }
        .source-link { display: block; text-align: center; color: rgba(255,255,255,0.9); text-decoration: none; margin-bottom: 20px; font-size: 0.9rem; }
        .source-link:hover { text-decoration: underline; }
        .date-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .date-card { background: white; border-radius: 16px; padding: 30px; text-align: center; text-decoration: none; color: #333; box-shadow: 0 8px 25px rgba(0,0,0,0.15); transition: all 0.3s ease; }
        .date-card:hover { transform: translateY(-5px); box-shadow: 0 12px 35px rgba(0,0,0,0.2); }
        .date-icon { font-size: 3rem; margin-bottom: 15px; }
        .date-text { font-size: 1.3rem; font-weight: 600; color: #4facfe; }
        .date-label { font-size: 0.9rem; color: #888; margin-top: 8px; }
        .empty-state { text-align: center; padding: 50px 20px; color: white; }
        .empty-state-icon { font-size: 4rem; margin-bottom: 15px; }
        .today-badge { display: inline-block; background: #ff6b6b; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-top: 10px; }
        @media (max-width: 600px) { h1 { font-size: 1.8rem; } .date-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← Back to B1 Home</a>
        
        <h1>📰 Taiwan News</h1>
        <p class="subtitle">Real Taiwan news simplified to B1 English level</p>
        <a href="https://english.ftvnews.com.tw/" target="_blank" class="source-link">
            Source: Formosa News (english.ftvnews.com.tw)
        </a>
        
        <div id="dates-container" class="date-grid">
            <div class="empty-state">
                <div class="empty-state-icon">📰</div>
                <h3>Loading dates...</h3>
            </div>
        </div>
    </div>

    <script>
        let dates = [];
        let today = new Date().toISOString().split('T')[0];

        async function loadDates() {
            try {
                const response = await fetch('dates.json');
                if (response.ok) {
                    dates = await response.json();
                    dates.sort().reverse();
                    renderDates();
                } else {
                    showError('No dates available');
                }
            } catch (e) {
                showError('Error loading dates');
            }
        }

        function showError(message) {
            document.getElementById('dates-container').innerHTML = `
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <div class="empty-state-icon">❌</div>
                    <h3>${message}</h3>
                </div>
            `;
        }

        function renderDates() {
            const container = document.getElementById('dates-container');
            
            if (dates.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">📭</div>
                        <h3>No news dates available</h3>
                        <p>Run the news generator to add content</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = dates.map(date => {
                const isToday = date === today;
                const dateObj = new Date(date + 'T00:00:00');
                const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
                const monthDay = dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
                
                return `
                    <a href="${date}/index.html" class="date-card">
                        <div class="date-icon">📅</div>
                        <div class="date-text">${date}</div>
                        <div class="date-label">${dayName}, ${monthDay}</div>
                        ${isToday ? '<div class="today-badge">TODAY</div>' : ''}
                    </a>
                `;
            }).join('');
        }

        loadDates();
    </script>
</body>
</html>
