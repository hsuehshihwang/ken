<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 News Article - A1 English</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .back-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.9;
        }
        
        .back-link:hover {
            opacity: 1;
        }
        
        .header-title {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .article-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .article-header {
            padding: 24px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .article-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .meta-badge {
            background: #d1fae5;
            color: #065f46;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        
        .article-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
            line-height: 1.4;
        }
        
        /* Audio Player Section */
        .audio-player {
            background: #f0fdf4;
            padding: 20px 24px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        
        .play-btn:hover {
            transform: scale(1.05);
        }
        
        .play-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .progress-container {
            flex: 1;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }
        
        .time-display {
            color: #6b7280;
            font-size: 0.85rem;
            min-width: 90px;
            text-align: right;
        }
        
        /* Speed Control */
        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .speed-label {
            color: #6b7280;
            font-size: 0.85rem;
        }
        
        .speed-btn {
            background: white;
            border: 1px solid #e5e7eb;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .speed-btn:hover {
            background: #f3f4f6;
        }
        
        .speed-btn.active {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        /* Sentence Navigation */
        .sentence-nav {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 10px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-btn:hover {
            background: #f3f4f6;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Article Content */
        .article-content {
            padding: 24px;
        }
        
        .content-label {
            font-size: 0.85rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        
        .sentences-list {
            list-style: none;
        }
        
        .sentence-item {
            padding: 16px;
            margin-bottom: 8px;
            background: #f9fafb;
            border-radius: 8px;
            border-left: 4px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        
        .sentence-item:hover {
            background: #f3f4f6;
        }
        
        .sentence-item.active {
            background: #d1fae5;
            border-left-color: #10b981;
        }
        
        .sentence-item.played {
            background: #ecfdf5;
            border-left-color: #34d399;
        }
        
        .sentence-number {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: #e5e7eb;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 0.75rem;
            color: #6b7280;
            margin-right: 8px;
        }
        
        .sentence-item.active .sentence-number {
            background: #10b981;
            color: white;
        }
        
        .sentence-item.played .sentence-number {
            background: #34d399;
            color: white;
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .original-link {
            display: inline-block;
            margin-top: 16px;
            color: #10b981;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .original-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 640px) {
            .player-controls {
                flex-wrap: wrap;
            }
            
            .progress-container {
                order: 3;
                width: 100%;
            }
            
            .sentence-nav {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <a href="index.html" class="back-link">← Back to A1 News</a>
            <div class="header-title">A1 Simplified News</div>
            <div style="width: 80px;"></div>
        </div>
    </div>
    
    <div class="container">
        <div class="article-card">
            <div class="article-header">
                <div class="article-meta">
                    <span class="meta-badge" id="articleDate">Loading...</span>
                    <span class="meta-badge">A1 Simplified</span>
                </div>
                <h1 class="article-title" id="articleTitle">Loading...</h1>
                <a href="#" class="original-link" id="originalLink" target="_blank">Read original on VOA →</a>
            </div>
            
            <div class="audio-player">
                <div class="player-controls">
                    <button class="play-btn" id="playBtn" disabled>▶</button>
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
                </div>
                
                <div class="speed-control">
                    <span class="speed-label">Speed:</span>
                    <button class="speed-btn" data-speed="0.5">0.5x</button>
                    <button class="speed-btn" data-speed="0.75">0.75x</button>
                    <button class="speed-btn active" data-speed="1">1x</button>
                    <button class="speed-btn" data-speed="1.25">1.25x</button>
                    <button class="speed-btn" data-speed="1.5">1.5x</button>
                </div>
                
                <div class="sentence-nav">
                    <button class="nav-btn" id="prevSentence" disabled>← Previous</button>
                    <button class="nav-btn" id="nextSentence">Next →</button>
                </div>
            </div>
            
            <div class="article-content">
                <div class="content-label">A1 Simplified Text</div>
                <ul class="sentences-list" id="sentencesList">
                    <li class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading article...</p>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        let articleData = null;
        let audio = null;
        let currentSentenceIndex = -1;
        let sentenceFiles = [];
        let isPlaying = false;
        let currentSentenceAudio = null;
        
        // Get article ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');
        
        async function loadArticle() {
            if (!articleId) {
                showError('No article ID provided');
                return;
            }
            
            try {
                const response = await fetch('a1-news.json');
                if (!response.ok) throw new Error('Failed to load news data');
                
                const data = await response.json();
                articleData = data.articles.find(a => a.id === articleId);
                
                if (!articleData) {
                    showError('Article not found');
                    return;
                }
                
                renderArticle();
                initAudio();
                
            } catch (error) {
                showError('Failed to load article');
            }
        }
        
        function renderArticle() {
            document.getElementById('articleTitle').textContent = articleData.title;
            document.getElementById('articleDate').textContent = articleData.date;
            
            // Set original link
            if (articleData.link) {
                document.getElementById('originalLink').href = articleData.link;
            }
            
            const sentencesList = document.getElementById('sentencesList');
            
            if (!articleData.sentences || articleData.sentences.length === 0) {
                sentencesList.innerHTML = '<li class="error">No content available. Please run generate_a1_news.py</li>';
                return;
            }
            
            // Store sentence files
            sentenceFiles = articleData.sentence_files || [];
            
            let html = '';
            articleData.sentences.forEach((sentence, index) => {
                html += `
                    <li class="sentence-item" data-index="${index}" onclick="playSentence(${index})">
                        <span class="sentence-number">${index + 1}</span>
                        ${escapeHtml(sentence)}
                    </li>
                `;
            });
            
            sentencesList.innerHTML = html;
        }
        
        function initAudio() {
            if (!articleData.audio_file) {
                document.getElementById('playBtn').disabled = true;
                document.getElementById('playBtn').textContent = 'No Audio';
                console.log('No audio_file in article data');
                return;
            }
            
            console.log('Loading audio:', articleData.audio_file);
            audio = new Audio(articleData.audio_file);
            
            audio.addEventListener('loadedmetadata', () => {
                console.log('Audio loaded, duration:', audio.duration);
                updateTimeDisplay();
                document.getElementById('playBtn').disabled = false;
            });
            
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('ended', () => {
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶';
                highlightSentence(-1);
            });
            
            audio.addEventListener('error', (e) => {
                console.error('Audio error:', e);
                document.getElementById('playBtn').disabled = true;
                document.getElementById('playBtn').textContent = 'Error';
            });
            
            // Progress bar click
            document.getElementById('progressContainer').addEventListener('click', (e) => {
                if (!audio.duration) return;
                const rect = e.target.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            });
            
            // Speed buttons
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    audio.playbackRate = parseFloat(btn.dataset.speed);
                });
            });
            
            // Navigation buttons
            document.getElementById('prevSentence').addEventListener('click', () => {
                if (currentSentenceIndex > 0) {
                    playSentence(currentSentenceIndex - 1);
                }
            });
            
            document.getElementById('nextSentence').addEventListener('click', () => {
                if (currentSentenceIndex < articleData.sentences.length - 1) {
                    playSentence(currentSentenceIndex + 1);
                }
            });
        }
        
        function togglePlay() {
            if (!audio) return;
            
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶';
            } else {
                audio.play();
                isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸';
            }
        }
        
        function updateProgress() {
            if (!audio.duration) return;
            
            const percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressBar').style.width = `${percent}%`;
            updateTimeDisplay();
        }
        
        function updateTimeDisplay() {
            const current = formatTime(audio.currentTime);
            const total = formatTime(audio.duration);
            document.getElementById('timeDisplay').textContent = `${current} / ${total}`;
        }
        
        function highlightSentence(index) {
            // Remove previous highlights
            document.querySelectorAll('.sentence-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // Add new highlight
            if (index >= 0) {
                const item = document.querySelector(`[data-index="${index}"]`);
                if (item) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
            
            currentSentenceIndex = index;
            
            // Update navigation buttons
            document.getElementById('prevSentence').disabled = currentSentenceIndex <= 0;
            document.getElementById('nextSentence').disabled = currentSentenceIndex >= articleData.sentences.length - 1;
        }
        
        function playSentence(index) {
            if (!sentenceFiles[index]) {
                // No individual sentence audio, play from full audio
                highlightSentence(index);
                return;
            }
            
            // Stop any current playback
            if (currentSentenceAudio) {
                currentSentenceAudio.pause();
                currentSentenceAudio = null;
            }
            
            // Highlight the sentence
            highlightSentence(index);
            
            // Play the individual sentence audio
            currentSentenceAudio = new Audio(sentenceFiles[index]);
            currentSentenceAudio.playbackRate = parseFloat(document.querySelector('.speed-btn.active').dataset.speed);
            
            currentSentenceAudio.onended = () => {
                currentSentenceAudio = null;
            };
            
            currentSentenceAudio.onerror = () => {
                console.log('Could not play sentence audio');
                currentSentenceAudio = null;
            };
            
            currentSentenceAudio.play();
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showError(message) {
            document.getElementById('sentencesList').innerHTML = `
                <li class="error">${message}</li>
            `;
        }
        
        // Play button click handler
        document.getElementById('playBtn').addEventListener('click', togglePlay);
        
        // Load article on page load
        loadArticle();
    </script>
</body>
</html>
