<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Player - A1 English</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            align-items: center;
        }

        select, button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select {
            flex: 1;
            min-width: 200px;
            background: #f0f0f0;
            border: 2px solid #ddd;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        button:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }

        button.secondary {
            background: #e0e0e0;
            color: #333;
        }

        button.secondary:hover {
            background: #d0d0d0;
        }

        button.success {
            background: #4caf50;
        }

        button.success:hover {
            background: #43a047;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: #f5f5f5;
            padding: 15px 20px;
            border-radius: 10px;
            flex: 1;
            min-width: 120px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f5f5f5;
            padding: 10px 15px;
            border-radius: 10px;
        }

        .speed-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .speed-display {
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .content {
            margin-top: 20px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .section-icon {
            font-size: 1.5rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }

        .sentence-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .sentence-item:hover {
            background: #f0f0f0;
        }

        .sentence-item.playing {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
        }

        .sentence-num {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .sentence-text {
            flex: 1;
            font-size: 1.1rem;
        }

        .voice-badge {
            background: #e0e0e0;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            color: #666;
        }

        .play-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2196f3;
            color: white;
        }

        .play-btn:hover {
            background: #1976d2;
        }

        .dialogue-item {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .dialogue-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .dialogue-num {
            background: #9c27b0;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .dialogue-title {
            font-weight: bold;
            color: #333;
        }

        .dialogue-play-btn {
            margin-left: auto;
        }

        .dialogue-lines {
            background: white;
            border-radius: 10px;
            padding: 15px;
        }

        .dialogue-line {
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .dialogue-line.person-a {
            background: #e3f2fd;
            border-left: 3px solid #2196f3;
        }

        .dialogue-line.person-b {
            background: #fce4ec;
            border-left: 3px solid #e91e63;
        }

        .person-label {
            font-weight: bold;
            margin-right: 8px;
        }

        .person-a .person-label {
            color: #2196f3;
        }

        .person-b .person-label {
            color: #e91e63;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .category-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .category-card {
            background: linear-gradient(135deg, var(--cat-color) 0%, var(--cat-color-dark) 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .category-card-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .category-card-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .category-card-count {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .controls {
                flex-direction: column;
            }
            
            select, button {
                width: 100%;
            }
            
            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← Back to A1 Home</a>
        
        <h1>🎧 Practice Player</h1>
        <p class="subtitle">50 sentences + 10 dialogues per topic with multiple voices</p>
        
        <div class="card">
            <div class="controls">
                <select id="topic-select">
                    <option value="">Select a topic...</option>
                </select>
                <button id="play-all-btn" onclick="playAll()">▶ Play All</button>
                <button id="stop-btn" class="secondary" onclick="stopAll()">⏹ Stop</button>
                <div class="speed-control">
                    <button class="speed-btn" onclick="changeSpeed(-0.25)">-</button>
                    <span id="speed-display" class="speed-display">1.0x</span>
                    <button class="speed-btn" onclick="changeSpeed(0.25)">+</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <div id="sentence-count" class="stat-value">0</div>
                    <div class="stat-label">Sentences</div>
                </div>
                <div class="stat">
                    <div id="dialogue-count" class="stat-value">0</div>
                    <div class="stat-label">Dialogues</div>
                </div>
                <div class="stat">
                    <div id="current-count" class="stat-value">0</div>
                    <div class="stat-label">Playing</div>
                </div>
            </div>
        </div>

        <div id="content" class="card">
            <div class="empty-state">
                <div class="empty-state-icon">🎧</div>
                <h3>Select a topic to start practicing</h3>
                <p>Choose a topic from the dropdown above</p>
            </div>
        </div>
    </div>

    <script>
        const audioBasePath = '../audio';
        let practiceData = null;
        let currentAudio = null;
        let currentSpeed = 1.0;
        let isPlayingAll = false;
        let playQueue = [];

        const topicSelect = document.getElementById('topic-select');
        const contentDiv = document.getElementById('content');

        // Load topics
        async function loadTopics() {
            try {
                const response = await fetch(`${audioBasePath}/practice_topics.json`);
                if (response.ok) {
                    const topics = await response.json();
                    topics.forEach(topic => {
                        const option = document.createElement('option');
                        option.value = topic.id;
                        option.textContent = topic.name;
                        topicSelect.appendChild(option);
                    });
                }
            } catch (e) {
                console.log('No practice_topics.json found');
            }
        }

        // Load practice data
        async function loadPracticeData(topicId) {
            try {
                const response = await fetch(`${audioBasePath}/practice_structure.json`);
                if (response.ok) {
                    const text = await response.text();
                    practiceData = JSON.parse(text);
                    renderTopic(topicId);
                } else {
                    console.error('Failed to load practice data:', response.status);
                }
            } catch (e) {
                console.error('Error loading practice data:', e);
            }
        }

        // Render topic content
        function renderTopic(topicId) {
            console.log('Rendering topic:', topicId);
            console.log('practiceData:', practiceData);
            
            if (!practiceData || !practiceData[topicId]) {
                console.error('No data for topic:', topicId);
                contentDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No content found</h3>
                        <p>Generate practice audio first</p>
                    </div>
                `;
                return;
            }

            const topic = practiceData[topicId];
            
            // Update stats
            document.getElementById('sentence-count').textContent = topic.sentences.length;
            document.getElementById('dialogue-count').textContent = topic.dialogues.length;
            document.getElementById('current-count').textContent = '0';

            let html = '';

            // Sentences section
            html += `
                <div class="section">
                    <div class="section-header">
                        <span class="section-icon">📝</span>
                        <span class="section-title">Sentences (50)</span>
                        <span style="color: #999; font-size: 0.9rem;">Multiple voices alternating</span>
                    </div>
            `;

            topic.sentences.forEach((item, index) => {
                const voiceParts = item.voice.split('-');
                const voiceName = voiceParts[voiceParts.length - 1].replace('Neural', '');
                html += `
                    <div class="sentence-item" id="sentence-${index}">
                        <span class="sentence-num">${index + 1}</span>
                        <span class="sentence-text">${item.text}</span>
                        <span class="voice-badge">${voiceName}</span>
                        <button class="play-btn" onclick="playSentence(${index})">▶</button>
                    </div>
                `;
            });

            html += '</div>';

            // Dialogues section
            html += `
                <div class="section">
                    <div class="section-header">
                        <span class="section-icon">💬</span>
                        <span class="section-title">Dialogues (10)</span>
                        <span style="color: #999; font-size: 0.9rem;">Two-voice conversations</span>
                    </div>
            `;

            topic.dialogues.forEach((dialogue, index) => {
                html += `
                    <div class="dialogue-item" id="dialogue-${index}">
                        <div class="dialogue-header">
                            <span class="dialogue-num">${index + 1}</span>
                            <span class="dialogue-title">Dialogue ${index + 1}</span>
                            <button class="play-btn dialogue-play-btn" onclick="playDialogue(${index})">▶</button>
                        </div>
                        <div class="dialogue-lines">
                `;

                dialogue.lines.forEach(line => {
                    const isPersonA = line.startsWith('Person A:');
                    const personClass = isPersonA ? 'person-a' : 'person-b';
                    const personLabel = isPersonA ? 'Person A' : 'Person B';
                    const text = line.replace(/^(Person [AB]:)\s*/, '');

                    html += `
                        <div class="dialogue-line ${personClass}">
                            <span class="person-label">${personLabel}:</span>${text}
                        </div>
                    `;
                });

                html += '</div></div>';
            });

            html += '</div>';

            contentDiv.innerHTML = html;
        }

        // Play a sentence
        function playSentence(index) {
            const topicId = topicSelect.value;
            if (!topicId || !practiceData || !practiceData[topicId]) return;

            const sentence = practiceData[topicId].sentences[index];
            if (!sentence) return;

            stopAll();
            clearHighlights();

            const item = document.getElementById(`sentence-${index}`);
            if (item) item.classList.add('playing');

            currentAudio = new Audio(`${audioBasePath}/${sentence.file}`);
            currentAudio.playbackRate = currentSpeed;
            
            currentAudio.onended = () => {
                if (item) item.classList.remove('playing');
            };

            currentAudio.play();
            document.getElementById('current-count').textContent = '1';
        }

        // Play a dialogue
        function playDialogue(index) {
            const topicId = topicSelect.value;
            if (!topicId || !practiceData || !practiceData[topicId]) return;

            const dialogue = practiceData[topicId].dialogues[index];
            if (!dialogue) return;

            stopAll();
            clearHighlights();

            const item = document.getElementById(`dialogue-${index}`);
            if (item) item.classList.add('playing');

            currentAudio = new Audio(`${audioBasePath}/${dialogue.file}`);
            currentAudio.playbackRate = currentSpeed;
            
            currentAudio.onended = () => {
                if (item) item.classList.remove('playing');
            };

            currentAudio.play();
            document.getElementById('current-count').textContent = '1';
        }

        // Play all
        function playAll() {
            const topicId = topicSelect.value;
            if (!topicId || !practiceData || !practiceData[topicId]) return;

            const topic = practiceData[topicId];
            playQueue = [];

            // Add all sentences
            topic.sentences.forEach((item, index) => {
                playQueue.push({ type: 'sentence', index: index, file: item.file });
            });

            // Add all dialogues
            topic.dialogues.forEach((dialogue, index) => {
                playQueue.push({ type: 'dialogue', index: index, file: dialogue.file });
            });

            isPlayingAll = true;
            document.getElementById('play-all-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;

            playNext();
        }

        // Play next in queue
        function playNext() {
            if (!isPlayingAll || playQueue.length === 0) {
                stopAll();
                return;
            }

            const item = playQueue.shift();
            clearHighlights();

            const elementId = item.type === 'sentence' ? `sentence-${item.index}` : `dialogue-${item.index}`;
            const element = document.getElementById(elementId);
            if (element) element.classList.add('playing');

            currentAudio = new Audio(`${audioBasePath}/${item.file}`);
            currentAudio.playbackRate = currentSpeed;

            document.getElementById('current-count').textContent = playQueue.length + 1;

            currentAudio.onended = () => {
                if (element) element.classList.remove('playing');
                playNext();
            };

            currentAudio.play();
        }

        // Stop all
        function stopAll() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            isPlayingAll = false;
            playQueue = [];
            clearHighlights();
            document.getElementById('play-all-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;
            document.getElementById('current-count').textContent = '0';
        }

        // Clear highlights
        function clearHighlights() {
            document.querySelectorAll('.playing').forEach(el => el.classList.remove('playing'));
        }

        // Change speed
        function changeSpeed(delta) {
            currentSpeed = Math.max(0.25, Math.min(2.0, currentSpeed + delta));
            document.getElementById('speed-display').textContent = currentSpeed.toFixed(2) + 'x';
            if (currentAudio) {
                currentAudio.playbackRate = currentSpeed;
            }
        }

        // Topic change handler
        topicSelect.addEventListener('change', function() {
            const topicId = this.value;
            console.log('Topic selected:', topicId);
            if (topicId) {
                stopAll();
                loadPracticeData(topicId);
            } else {
                contentDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎧</div>
                        <h3>Select a topic to start practicing</h3>
                        <p>Choose a topic from the dropdown above</p>
                    </div>
                `;
            }
        });

        // Initialize
        loadTopics();
    </script>
</body>
</html>
